# nnictl create --config ./auto_hyper/online_rl/Sports/model_config.yaml --port 8070

experimentName: Your_Experiment_Name
max_trial_number: 100

searchSpaceFile: model_search_space.json

trialCommand: > 
  python train_with_online_rl.py 
  tokenizer.data_text_files="./data/Sports/item2title.pkl" 
  tokenizer.interaction_files="./data/Sports/user2item.pkl" 
  output_dir="/home/zsj/pretrained-models/Sports-Official" 
  model.data_interaction_files="./data/Sports/user2item.pkl" 
  model.data_text_files="./data/Sports/item2title.pkl" 
  model.num_epochs=20 
  online_rl=rankpo_off_policy_random
  online_rl.pretrained_model="/home/zsj/pretrained-models/Sports-Official/generation_model" 
  online_rl.save_model_path="/home/zsj/pretrained-models/Sports-PostTrain-Test" 

trialCodeDirectory: ../../..

trialGpuNumber: 1       # 每块 GPU 上多少个实验
trial_concurrency: 4    # 多少个实验一起跑


tuner:
  name: TPE
  classArgs:
    optimize_mode: maximize

trainingService:
  platform: local
  maxTrialNumberPerGpu: 1
  useActiveGpu: true
  gpuIndices: [0,1,2,3]